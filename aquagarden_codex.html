<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 디지털 수족관</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #05141a;
      --bg-surface: #0a242d;
      --panel: rgba(8, 33, 39, 0.72);
      --panel-border: rgba(162, 221, 208, 0.28);
      --text-main: #e2f2ef;
      --text-sub: #acd0c8;
      --accent: #9fe8c8;
      --accent-2: #ffd18a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 12% 18%, rgba(32, 91, 96, 0.28), transparent 34%),
        radial-gradient(circle at 84% 16%, rgba(18, 55, 66, 0.48), transparent 46%),
        linear-gradient(170deg, var(--bg-surface), var(--bg-deep));
      color: var(--text-main);
      font-family: 'Noto Sans KR', sans-serif;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #viewport {
      width: 100%;
      height: 100%;
    }

    #hud {
      position: absolute;
      top: 18px;
      left: 18px;
      right: 18px;
      display: flex;
      gap: 14px;
      justify-content: space-between;
      pointer-events: none;
    }

    .panel {
      pointer-events: auto;
      border: 1px solid var(--panel-border);
      background: var(--panel);
      backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
      border-radius: 14px;
      box-shadow: 0 14px 26px rgba(0, 0, 0, 0.35);
    }

    #controls {
      width: min(380px, 100%);
      padding: 14px 16px;
    }

    #controls h1 {
      margin: 0 0 12px;
      font-size: 1rem;
      letter-spacing: 0.03em;
      color: #d6f4e5;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
      color: var(--text-sub);
      font-size: 0.9rem;
    }

    .row input[type='range'] {
      grid-column: 1 / -1;
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .value {
      color: var(--accent-2);
      font-variant-numeric: tabular-nums;
    }

    .presetGroup {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .presetBtn {
      border: 1px solid rgba(160, 221, 208, 0.18);
      background: rgba(12, 38, 45, 0.68);
      color: var(--text-sub);
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 140ms ease, color 140ms ease, border-color 140ms ease, transform 140ms ease;
    }

    .presetBtn:hover {
      transform: translateY(-1px);
      border-color: rgba(160, 221, 208, 0.34);
      color: var(--text-main);
    }

    .presetBtn.is-active {
      background: rgba(131, 195, 176, 0.2);
      color: #eff8f6;
      border-color: rgba(182, 235, 214, 0.5);
      box-shadow: inset 0 0 0 1px rgba(219, 248, 238, 0.08);
    }

    #quoteBox {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 18px;
      padding: 14px 16px;
      max-width: 940px;
      margin: 0 auto;
      border: 1px solid var(--panel-border);
      background: rgba(7, 20, 24, 0.74);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 14px;
      pointer-events: none;
    }

    #quoteLabel {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--accent);
      margin-bottom: 6px;
    }

    #quoteText {
      margin: 0;
      font-family: 'Nanum Myeongjo', serif;
      line-height: 1.55;
      color: #edf9f6;
      font-size: clamp(0.96rem, 2vw, 1.1rem);
    }

    #hint {
      margin-top: 9px;
      color: var(--text-sub);
      font-size: 0.78rem;
      opacity: 0.85;
    }

    @media (max-width: 760px) {
      #hud {
        flex-direction: column;
        align-items: stretch;
      }

      #controls {
        width: 100%;
      }

      #quoteBox {
        left: 12px;
        right: 12px;
        bottom: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="viewport"></div>

    <div id="hud">
      <section id="controls" class="panel">
        <h1>조명 제어</h1>
        <label class="row" for="intensity">
          밝기
          <span id="intensityValue" class="value">1.55</span>
          <input id="intensity" type="range" min="0.35" max="2.4" step="0.01" value="1.55" />
        </label>
        <label class="row" for="warmth">
          색온도
          <span id="warmthValue" class="value">7000K</span>
          <input id="warmth" type="range" min="2600" max="11000" step="50" value="7000" />
        </label>
        <div class="row">
          분위기
          <span id="presetValue" class="value">중성 낮</span>
          <div class="presetGroup">
            <button class="presetBtn is-active" type="button" data-preset="day">중성 낮</button>
            <button class="presetBtn" type="button" data-preset="morning">차분한 아침</button>
            <button class="presetBtn" type="button" data-preset="dusk">몽환적 저녁</button>
          </div>
        </div>
      </section>
    </div>

    <aside id="quoteBox">
      <div id="quoteLabel">오브젝트 명언</div>
      <p id="quoteText">수족관 속 오브젝트를 클릭하면 관련된 명언이 표시됩니다.</p>
      <div id="hint">팁: 드래그로 시점을 회전하고, 휠로 확대/축소할 수 있습니다.</div>
    </aside>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const viewport = document.getElementById('viewport');
    const quoteLabel = document.getElementById('quoteLabel');
    const quoteText = document.getElementById('quoteText');
    const intensityInput = document.getElementById('intensity');
    const warmthInput = document.getElementById('warmth');
    const intensityValue = document.getElementById('intensityValue');
    const warmthValue = document.getElementById('warmthValue');
    const presetValue = document.getElementById('presetValue');
    const presetButtons = Array.from(document.querySelectorAll('.presetBtn'));

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0d1d25);
    scene.fog = new THREE.FogExp2(0x102028, 0.028);
    const presetSceneColor = new THREE.Color();
    const presetFogColor = new THREE.Color();

    const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 120);
    camera.position.set(1.2, 4.9, 16.8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.03;
    viewport.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.045;
    controls.minDistance = 9;
    controls.maxDistance = 28;
    controls.maxPolarAngle = Math.PI * 0.48;
    controls.target.set(-1.2, 3.35, -0.2);

    const tank = {
      width: 22,
      height: 10,
      depth: 10,
      minX: -10.6,
      maxX: 10.6,
      minY: 0.6,
      maxY: 9.2,
      minZ: -4.7,
      maxZ: 4.7
    };

    const clickableMeshes = [];
    const animatedPlants = [];
    const bubbles = [];
    const fishes = [];
    const speciesBuckets = new Map();
    const swimObstacles = [];

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const clock = new THREE.Clock();

    const tempA = new THREE.Vector3();
    const tempB = new THREE.Vector3();
    const tempLook = new THREE.Vector3();
    const tempC = new THREE.Vector3();
    const tempD = new THREE.Vector3();
    const tempMatrix = new THREE.Matrix4();
    const tempQuat = new THREE.Quaternion();
    let activePresetKey = 'day';

    function rand(min, max) {
      return min + Math.random() * (max - min);
    }

    function cssColorFromHex(hex) {
      return `#${new THREE.Color(hex).getHexString()}`;
    }

    function createSandTexture(size = 768) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      const grad = ctx.createLinearGradient(0, 0, 0, size);
      grad.addColorStop(0, '#7c6a43');
      grad.addColorStop(1, '#3b2d1b');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, size, size);

      for (let i = 0; i < 64000; i += 1) {
        const x = Math.random() * size;
        const y = Math.random() * size;
        const a = Math.random() * 0.38;
        const r = Math.random() * 1.6 + 0.15;
        ctx.fillStyle = `rgba(${86 + Math.random() * 120}, ${67 + Math.random() * 80}, ${36 + Math.random() * 55}, ${a})`;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }

      const tex = new THREE.CanvasTexture(canvas);
      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(4, 2);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    function createSandPathTexture(size = 1024) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      ctx.clearRect(0, 0, size, size);
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, size, size);

      ctx.save();
      ctx.translate(size * 0.58, size * 0.54);
      ctx.rotate(-0.22);
      const gradA = ctx.createRadialGradient(0, 0, size * 0.05, 0, 0, size * 0.28);
      gradA.addColorStop(0, 'rgba(255,255,255,0.95)');
      gradA.addColorStop(0.6, 'rgba(242,231,196,0.66)');
      gradA.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gradA;
      ctx.beginPath();
      ctx.ellipse(0, 0, size * 0.28, size * 0.16, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      ctx.save();
      ctx.translate(size * 0.72, size * 0.46);
      ctx.rotate(-0.45);
      const gradB = ctx.createRadialGradient(0, 0, size * 0.02, 0, 0, size * 0.16);
      gradB.addColorStop(0, 'rgba(255,255,255,0.82)');
      gradB.addColorStop(0.7, 'rgba(242,231,196,0.35)');
      gradB.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gradB;
      ctx.beginPath();
      ctx.ellipse(0, 0, size * 0.16, size * 0.09, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    function isOpenPathZone(x, z) {
      const mainPath = ((x - 2.5) / 5.1) ** 2 + ((z - 1.0) / 1.85) ** 2 < 1;
      const taper = ((x - 5.7) / 2.45) ** 2 + ((z - 0.1) / 1.15) ** 2 < 1;
      return mainPath || taper;
    }

    function createBackTexture(size = 1024) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      const grad = ctx.createLinearGradient(0, 0, 0, size);
      grad.addColorStop(0, '#274753');
      grad.addColorStop(0.4, '#16363f');
      grad.addColorStop(1, '#0a1c22');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, size, size);

      for (let i = 0; i < 4200; i += 1) {
        const x = Math.random() * size;
        const y = Math.random() * size;
        const alpha = Math.random() * 0.25;
        ctx.fillStyle = `rgba(147, 210, 206, ${alpha})`;
        ctx.fillRect(x, y, Math.random() * 3 + 1, Math.random() * 28 + 8);
      }

      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    function createRockTexture(color, size = 256) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const base = new THREE.Color(color);
      const dark = base.clone().offsetHSL(0, -0.03, -0.04);
      const light = base.clone().offsetHSL(0.01, 0.04, 0.16);

      ctx.fillStyle = cssColorFromHex(base);
      ctx.fillRect(0, 0, size, size);

      for (let i = 0; i < 80; i += 1) {
        const x = rand(0, size);
        const y = rand(0, size);
        const r = rand(size * 0.04, size * 0.18);
        const grad = ctx.createRadialGradient(x, y, r * 0.15, x, y, r);
        grad.addColorStop(0, cssColorFromHex(light));
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }

      for (let i = 0; i < 120; i += 1) {
        const x = rand(0, size);
        const y = rand(0, size);
        const r = rand(size * 0.05, size * 0.16);
        const grad = ctx.createRadialGradient(x, y, r * 0.15, x, y, r);
        grad.addColorStop(0, cssColorFromHex(dark));
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }

      for (let i = 0; i < 20; i += 1) {
        ctx.strokeStyle = `rgba(255,255,255,${Math.random() * 0.035})`;
        ctx.lineWidth = Math.random() * 1.2 + 0.2;
        ctx.beginPath();
        const startX = Math.random() * size;
        const startY = Math.random() * size;
        ctx.moveTo(startX, startY);
        ctx.bezierCurveTo(
          startX + rand(-18, 18),
          startY + rand(-18, 18),
          startX + rand(-22, 22),
          startY + rand(-22, 22),
          startX + rand(-32, 32),
          startY + rand(-32, 32)
        );
        ctx.stroke();
      }

      for (let i = 0; i < 7000; i += 1) {
        const x = Math.random() * size;
        const y = Math.random() * size;
        const a = Math.random() * 0.08;
        const r = Math.random() * 1.2 + 0.18;
        ctx.fillStyle = `rgba(${82 + Math.random() * 42}, ${90 + Math.random() * 36}, ${82 + Math.random() * 32}, ${a})`;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }

      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(1.6, 1.6);
      return tex;
    }

    function createWoodTexture(baseHex = 0x5d3921, size = 512) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const base = new THREE.Color(baseHex);
      const dark = base.clone().offsetHSL(0.01, -0.05, -0.08);
      const light = base.clone().offsetHSL(0.01, 0.04, 0.16);

      const grad = ctx.createLinearGradient(0, 0, size, 0);
      grad.addColorStop(0, cssColorFromHex(dark));
      grad.addColorStop(0.42, cssColorFromHex(base));
      grad.addColorStop(1, cssColorFromHex(light));
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, size, size);

      for (let i = 0; i < 260; i += 1) {
        const y = (i / 260) * size + rand(-2.2, 2.2);
        ctx.strokeStyle = `rgba(${72 + Math.random() * 42}, ${44 + Math.random() * 30}, ${24 + Math.random() * 20}, ${0.16 + Math.random() * 0.12})`;
        ctx.lineWidth = rand(0.7, 2.4);
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.bezierCurveTo(
          size * 0.28, y + rand(-10, 10),
          size * 0.72, y + rand(-14, 14),
          size, y + rand(-10, 10)
        );
        ctx.stroke();
      }

      for (let i = 0; i < 14; i += 1) {
        const x = rand(size * 0.08, size * 0.92);
        const y = rand(size * 0.08, size * 0.92);
        const rx = rand(16, 34);
        const ry = rand(8, 18);
        ctx.fillStyle = `rgba(52, 32, 18, ${rand(0.12, 0.22)})`;
        ctx.beginPath();
        ctx.ellipse(x, y, rx, ry, rand(-0.6, 0.6), 0, Math.PI * 2);
        ctx.fill();
      }

      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(2.4, 1.3);
      return tex;
    }

    function kelvinToColor(kelvin) {
      const k = kelvin / 100;
      let r;
      let g;
      let b;

      if (k <= 66) {
        r = 255;
        g = 99.4708025861 * Math.log(k) - 161.1195681661;
      } else {
        r = 329.698727446 * Math.pow(k - 60, -0.1332047592);
        g = 288.1221695283 * Math.pow(k - 60, -0.0755148492);
      }

      if (k >= 66) {
        b = 255;
      } else if (k <= 19) {
        b = 0;
      } else {
        b = 138.5177312231 * Math.log(k - 10) - 305.0447927307;
      }

      return new THREE.Color(
        THREE.MathUtils.clamp(r / 255, 0, 1),
        THREE.MathUtils.clamp(g / 255, 0, 1),
        THREE.MathUtils.clamp(b / 255, 0, 1)
      );
    }

    const lightingPresets = {
      day: {
        label: '중성 낮',
        intensity: 1.72,
        warmth: 7000,
        exposure: 1.12,
        background: 0x12242c,
        fog: 0x18313a,
        fogDensity: 0.024,
        ambientTint: new THREE.Color(0xa6d8dd),
        fillTint: new THREE.Color(0xa9dff2),
        backTint: new THREE.Color(0x5ad6b1),
        keyPosition: new THREE.Vector3(-3.2, 12.2, 5.2),
        fillPosition: new THREE.Vector3(7.2, 5.2, 3.4),
        backPosition: new THREE.Vector3(-6.8, 4.5, -4.5)
      },
      morning: {
        label: '차분한 아침',
        intensity: 1.4,
        warmth: 5600,
        exposure: 1.02,
        background: 0x1a2b31,
        fog: 0x22373c,
        fogDensity: 0.022,
        ambientTint: new THREE.Color(0xbdd3c1),
        fillTint: new THREE.Color(0xd9e2bf),
        backTint: new THREE.Color(0x6bbda8),
        keyPosition: new THREE.Vector3(-5.8, 10.8, 4.1),
        fillPosition: new THREE.Vector3(6.2, 4.6, 2.1),
        backPosition: new THREE.Vector3(-7.2, 5.0, -4.4)
      },
      dusk: {
        label: '몽환적 저녁',
        intensity: 1.24,
        warmth: 4300,
        exposure: 0.98,
        background: 0x101924,
        fog: 0x162330,
        fogDensity: 0.029,
        ambientTint: new THREE.Color(0x97b5c1),
        fillTint: new THREE.Color(0xd6b28d),
        backTint: new THREE.Color(0x54c9c1),
        keyPosition: new THREE.Vector3(-2.1, 11.0, 6.6),
        fillPosition: new THREE.Vector3(8.5, 4.3, 1.8),
        backPosition: new THREE.Vector3(-7.8, 4.8, -4.0)
      }
    };

    function markInteractive(root, label, quote) {
      const info = { label, quote };
      root.userData.interactive = info;
      root.traverse((child) => {
        if (!child.isMesh) {
          return;
        }
        child.userData.interactive = info;
        child.userData.interactiveRoot = root;
        clickableMeshes.push(child);
      });
    }

    function showQuote(info) {
      quoteLabel.textContent = info.label;
      quoteText.textContent = info.quote;
    }

    function createTankEnvironment() {
      const tankGroup = new THREE.Group();
      scene.add(tankGroup);

      const sandMap = createSandTexture();
      const sandPathMap = createSandPathTexture();
      const backMap = createBackTexture();

      const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(tank.width, tank.depth, 1, 1),
        new THREE.MeshStandardMaterial({
          map: sandMap,
          roughness: 0.95,
          metalness: 0.02
        })
      );
      floor.rotation.x = -Math.PI / 2;
      floor.position.y = 0;
      tankGroup.add(floor);

      const sandPath = new THREE.Mesh(
        new THREE.PlaneGeometry(11.6, 5.7, 1, 1),
        new THREE.MeshStandardMaterial({
          color: 0xc8b177,
          alphaMap: sandPathMap,
          transparent: true,
          opacity: 0.88,
          roughness: 0.96,
          metalness: 0.01,
          depthWrite: false
        })
      );
      sandPath.rotation.x = -Math.PI / 2;
      sandPath.position.set(3.0, 0.025, 0.85);
      tankGroup.add(sandPath);

      const frontSlope = new THREE.Mesh(
        new THREE.BoxGeometry(tank.width, 1.45, 1.28),
        new THREE.MeshStandardMaterial({
          color: 0x221912,
          roughness: 0.93,
          metalness: 0
        })
      );
      frontSlope.position.set(0, -0.52, tank.maxZ + 0.42);
      tankGroup.add(frontSlope);

      const backWall = new THREE.Mesh(
        new THREE.PlaneGeometry(tank.width, tank.height),
        new THREE.MeshStandardMaterial({
          map: backMap,

    function createRock(radius, color = 0x5c6a61) {
      const geo = new THREE.SphereGeometry(radius, 28, 22);
      const pos = geo.attributes.position;

      for (let i = 0; i < pos.count; i += 1) {
        const x = pos.getX(i);
        const y = pos.getY(i);
        const z = pos.getZ(i);
        const yBias = 1 - Math.abs(y / radius) * 0.18;
        const wobble =
          Math.sin(x * 2.35 + z * 2.6 + i * 0.12) * 0.075 +
          Math.sin(y * 3.1 + i * 0.26) * 0.05 +
          Math.cos((x + y + z) * 2.9) * 0.04;
        const scale = 1 + wobble * yBias;
        pos.setXYZ(i, x * scale, y * scale * 0.9, z * scale * 1.06);
      }

      geo.computeVertexNormals();
      const rockMap = createRockTexture(color);
      return new THREE.Mesh(
        geo,
        new THREE.MeshPhysicalMaterial({
          map: rockMap,
          color: 0xf3f7f2,
          roughness: 0.9,
          metalness: 0.01
        })
      );
    }

      const woodGroup = new THREE.Group();

      const woodMat = new THREE.MeshPhysicalMaterial({

        clearcoatRoughness: 0.7

      const darkWoodMat = woodMat.clone();

      const mossMat = new THREE.MeshStandardMaterial({
        color: 0x5c7a44,
        roughness: 1,
        metalness: 0,
        side: THREE.DoubleSide
      });

      function addTaperedBranch(points, startRadius, endRadius, material = woodMat, segments = 14) {
        const branch = new THREE.Group();
        const curve = new THREE.CatmullRomCurve3(points.map((point) => new THREE.Vector3(point[0], point[1], point[2])));
        const sampled = curve.getPoints(segments);

        for (let i = 0; i < sampled.length - 1; i += 1) {
          const a = sampled[i];
          const b = sampled[i + 1];
          const center = a.clone().add(b).multiplyScalar(0.5);
          const segment = new THREE.Mesh(
            new THREE.CylinderGeometry(
              THREE.MathUtils.lerp(startRadius, endRadius, (i + 1) / (sampled.length - 1)),
              THREE.MathUtils.lerp(startRadius, endRadius, i / (sampled.length - 1)),
              a.distanceTo(b),
              11,
              1,
              false
            ),
            material
          );
          segment.position.copy(center);
          segment.quaternion.setFromUnitVectors(
            new THREE.Vector3(0, 1, 0),
            b.clone().sub(a).normalize()
          );
          branch.add(segment);

          if (i < sampled.length - 2) {
            const jointRadius = THREE.MathUtils.lerp(startRadius, endRadius, (i + 1) / (sampled.length - 1)) * 1.06;
            const joint = new THREE.Mesh(new THREE.SphereGeometry(jointRadius, 10, 10), material);
            joint.position.copy(b);
            joint.scale.set(1.1, 0.9, 1.1);
            branch.add(joint);
          }
        }

        woodGroup.add(branch);
        return branch;
      }

            pos.setZ(j, bend);
            pos.setX(j, pos.getX(j) * (1 - yRatio * 0.45));

    function createPlantBlade(height, width, color) {
      const geometry = new THREE.PlaneGeometry(width, height, 3, 10);
      const pos = geometry.attributes.position;

      for (let i = 0; i < pos.count; i += 1) {
        const y = pos.getY(i) + height * 0.5;
        const yRatio = y / height;
        const taper = 1 - yRatio * 0.72;
        const sway = Math.sin(yRatio * Math.PI) * width * rand(0.04, 0.16);
        pos.setX(i, pos.getX(i) * taper + sway);
        pos.setZ(i, Math.sin(yRatio * Math.PI * 0.9) * width * rand(0.08, 0.24));
      }

      pos.needsUpdate = true;
      geometry.computeVertexNormals();

      const blade = new THREE.Mesh(
        geometry,
        new THREE.MeshStandardMaterial({
          color,
          roughness: 0.67,
          metalness: 0,
          side: THREE.DoubleSide
        })
      );
      blade.position.y = height * 0.5;
      return blade;
    }

    function createBroadLeaf(height, width, color) {
      const geometry = new THREE.PlaneGeometry(width, height, 4, 12);
      const pos = geometry.attributes.position;

      for (let i = 0; i < pos.count; i += 1) {
        const y = pos.getY(i) + height * 0.5;
        const yRatio = y / height;
        const bulb = Math.sin(yRatio * Math.PI) * 0.45;
        const taper = 0.28 + bulb;
        pos.setX(i, pos.getX(i) * taper);
        pos.setZ(i, Math.sin(yRatio * Math.PI) * width * rand(0.14, 0.3));
      }

      pos.needsUpdate = true;
      geometry.computeVertexNormals();

      const leaf = new THREE.Mesh(
        geometry,
        new THREE.MeshStandardMaterial({
          color,
          roughness: 0.72,
          metalness: 0,
          side: THREE.DoubleSide
        })
      );
      leaf.position.y = height * 0.46;
      return leaf;
    }

    function createPlantCluster({ x, z, count, spread, palette, maxHeight, minHeight, quote, label }) {
      const group = new THREE.Group();
      group.position.set(x, 0, z);
      scene.add(group);

      for (let i = 0; i < count; i += 1) {
        const pivot = new THREE.Object3D();
        pivot.position.set(rand(-spread, spread), 0, rand(-spread, spread));
        pivot.rotation.x = rand(-0.05, 0.06);
        pivot.rotation.z = rand(-0.1, 0.1);

        const height = rand(minHeight, maxHeight);
        const bladeColor = palette[Math.floor(rand(0, palette.length))];
        const isBroadLeaf = Math.random() < 0.18;
        const blade = isBroadLeaf
          ? createBroadLeaf(height * rand(0.6, 0.92), rand(0.16, 0.34), bladeColor)
          : createPlantBlade(height, rand(0.07, 0.17), bladeColor);
        blade.rotation.y = rand(0, Math.PI);

        pivot.add(blade);
        if (!isBroadLeaf && Math.random() < 0.42) {
          const crown = new THREE.Mesh(
            new THREE.SphereGeometry(rand(0.03, 0.06), 6, 6),
            new THREE.MeshStandardMaterial({
              color: palette[Math.floor(rand(0, palette.length))],
              roughness: 0.58,
              metalness: 0
            })
          );
          crown.position.y = height * rand(0.76, 0.92);
          crown.position.x = rand(-0.05, 0.05);
          crown.position.z = rand(-0.05, 0.05);
          crown.scale.set(rand(0.8, 1.3), rand(0.85, 1.2), rand(0.8, 1.3));
          pivot.add(crown);
        }
        group.add(pivot);

        animatedPlants.push({
          pivot,
          baseX: pivot.rotation.x,
          baseZ: pivot.rotation.z,
          phase: Math.random() * Math.PI * 2,
          sway: rand(0.07, 0.25),
          speed: rand(0.8, 1.8)
        });
      }

      markInteractive(group, label, quote);
      return group;
    }

    function createPebbles() {
      const pebbleGeo = new THREE.SphereGeometry(0.07, 8, 8);
      const pebbleMat = new THREE.MeshStandardMaterial({ color: 0x8f7b56, roughness: 0.9, metalness: 0 });
      const count = 460;
      const mesh = new THREE.InstancedMesh(pebbleGeo, pebbleMat, count);
      const matrix = new THREE.Matrix4();
      const quat = new THREE.Quaternion();
      const scale = new THREE.Vector3();

      for (let i = 0; i < count; i += 1) {
        let x;
        let z;
        let attempts = 0;
        do {
          x = rand(tank.minX + 0.4, tank.maxX - 0.4);
          z = rand(tank.minZ + 0.4, tank.maxZ - 0.2);
          attempts += 1;
        } while (isOpenPathZone(x, z) && attempts < 12);

        const pos = new THREE.Vector3(x, rand(0.03, 0.1), z);
        quat.setFromEuler(new THREE.Euler(rand(0, Math.PI), rand(0, Math.PI), rand(0, Math.PI)));
        const s = rand(0.55, 1.7);
        scale.set(s * 0.9, s * 0.65, s);
        matrix.compose(pos, quat, scale);
        mesh.setMatrixAt(i, matrix);
      }

      scene.add(mesh);
    }

    function createBubbleField() {
      const bubbleMat = new THREE.MeshPhysicalMaterial({
        color: 0xb8ecff,

        opacity: 0.42,
        roughness: 0.08,

        transmission: 0.9,

        depthWrite: false

        new THREE.Vector3(-3.8, 0.6, -0.9),
        new THREE.Vector3(0.9, 0.6, -0.4),
        new THREE.Vector3(5.8, 0.6, -0.8)
      ];

      function resetBubble(bubble, soft = false) {
        bubble.mesh.position.set(
          bubble.emitter.x + rand(-0.35, 0.35),

        bubble.wobble = rand(0.05, 0.16);
        bubble.phase = Math.random() * Math.PI * 2;
        bubble.freq = rand(0.6, 1.7);

      emitters.forEach((emitter, idx) => {

          };

          bubbles.push(bubble);

      const airStone = new THREE.Mesh(

    function createClosedShape(points) {
      const curve = new THREE.CatmullRomCurve3(
        points.map((point) => new THREE.Vector3(point[0], point[1], 0)),
        true,
        'catmullrom',
        0.45
      );

      return new THREE.Shape(
        curve.getPoints(Math.max(40, points.length * 10)).map((point) => new THREE.Vector2(point.x, point.y))
      );
    }

    function createFishBodyMesh(points, depth, material) {
      const geometry = new THREE.ExtrudeGeometry(createClosedShape(points), {
        depth,
        steps: 1,
        bevelEnabled: true,
        bevelThickness: Math.min(depth * 0.35, 0.05),
        bevelSize: Math.min(depth * 0.28, 0.04),
        bevelSegments: 3,
        curveSegments: 42
      });

      geometry.center();
      geometry.rotateY(-Math.PI / 2);
      geometry.computeVertexNormals();
      return new THREE.Mesh(geometry, material);
    }

    function createFinMesh(points, material) {
      const geometry = new THREE.ShapeGeometry(createClosedShape(points), 28);
      geometry.computeVertexNormals();
      return new THREE.Mesh(geometry, material);
    }

    function createFishSkinTexture({
      width = 512,
      height = 256,
      top = '#425d7f',
      mid = '#7ea6bc',
      belly = '#d7dfd7',
      accent = null,
      accentBand = null,
      stripes = [],
      speckles = 0
    } = {}) {
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');

      const baseGrad = ctx.createLinearGradient(0, 0, 0, height);
      baseGrad.addColorStop(0, top);
      baseGrad.addColorStop(0.48, mid);
      baseGrad.addColorStop(1, belly);
      ctx.fillStyle = baseGrad;
      ctx.fillRect(0, 0, width, height);

      if (accent && accentBand) {
        const band = ctx.createLinearGradient(0, 0, width, 0);
        band.addColorStop(0, 'rgba(0,0,0,0)');
        band.addColorStop(Math.max(0, accentBand.start - 0.12), 'rgba(0,0,0,0)');
        band.addColorStop(accentBand.start, accent);
        band.addColorStop(accentBand.end, accent);
        band.addColorStop(Math.min(1, accentBand.end + 0.12), 'rgba(0,0,0,0)');
        band.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = band;
        ctx.fillRect(0, accentBand.y * height, width, accentBand.height * height);
      }

      stripes.forEach((stripe) => {
        ctx.save();
        ctx.globalAlpha = stripe.alpha ?? 0.9;
        ctx.fillStyle = stripe.color;
        if (stripe.type === 'vertical') {
          ctx.fillRect(stripe.x * width, 0, stripe.width * width, height);
        } else {
          ctx.fillRect(0, stripe.y * height, width, stripe.height * height);
        }
        ctx.restore();
      });

      if (speckles > 0) {
        for (let i = 0; i < speckles; i += 1) {
          const x = Math.random() * width;
          const y = Math.random() * height;
          const a = Math.random() * 0.12;
          const r = Math.random() * 1.6 + 0.2;
          ctx.fillStyle = `rgba(255,255,255,${a})`;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    function createLatheBodyMesh(points, material, { scaleX = 1, scaleY = 1, scaleZ = 1, radialSegments = 56 } = {}) {
      const geometry = new THREE.LatheGeometry(
        points.map((point) => new THREE.Vector2(point[0], point[1])),
        radialSegments
      );
      geometry.rotateZ(Math.PI / 2);
      geometry.rotateY(Math.PI / 2);
      geometry.scale(scaleX, scaleY, scaleZ);
      geometry.center();
      geometry.computeVertexNormals();
      return new THREE.Mesh(geometry, material);
    }

    function createFusiformBody({
      material,
      length = 2.2,
      height = 0.7,
      width = 0.22,
      fullness = 1
    }) {
      const baseProfile = [
        [0.03, -1.18],
        [0.12, -1.06],
        [0.28, -0.78],
        [0.52 * fullness, -0.28],
        [0.62 * fullness, 0.02],
        [0.58 * fullness, 0.34],
        [0.38 * fullness, 0.76],
        [0.16, 1.02],
        [0.03, 1.18]
      ];

      return createLatheBodyMesh(baseProfile, material, {
        scaleX: width,
        scaleY: height,
        scaleZ: length / 2.36,
        radialSegments: 64
      });
    }

    function createAngelfishBody(material) {
      const geometry = new THREE.SphereGeometry(1, 56, 42);
      geometry.rotateY(Math.PI / 2);
      const pos = geometry.attributes.position;

      for (let i = 0; i < pos.count; i += 1) {
        const x = pos.getX(i);
        const y = pos.getY(i);
        const z = pos.getZ(i);
        const frontBack = (z + 1) * 0.5;
        const sideTaper = 0.18 + Math.sin(frontBack * Math.PI) * 0.2;
        const tailPinch = 1 - THREE.MathUtils.smoothstep(frontBack, 0.68, 1) * 0.78;
        const snoutPinch = 0.72 + THREE.MathUtils.smoothstep(frontBack, 0, 0.18) * 0.16;
        const bellyLift = Math.sin(frontBack * Math.PI) * 0.05;

        pos.setXYZ(
          i,
          x * 0.21 * sideTaper * tailPinch,
          y * (0.92 + Math.abs(y) * 0.16) + bellyLift,
          z * 0.86 * snoutPinch
        );
      }

      geometry.scale(0.94, 1.1, 0.78);
      geometry.computeVertexNormals();
      return new THREE.Mesh(geometry, material);
    }

    function createTailRig({ peduncleLength, peduncleRadius, tailLength, tailHeight, peduncleMaterial, tailMaterial }) {
      const root = new THREE.Group();

      const peduncle = new THREE.Mesh(
        new THREE.CylinderGeometry(peduncleRadius * 0.78, peduncleRadius, peduncleLength, 10),
        peduncleMaterial
      );
      peduncle.rotation.x = Math.PI / 2;

      const mid = new THREE.Group();
      mid.position.z = peduncleLength * 0.96;
      root.add(mid);

      const tail = createFinMesh(
        [
          [0, 0],
          [tailLength * 0.36, tailHeight * 0.52],

      tail.rotation.y = -Math.PI / 2;

          [tailLength * 0.18, -tailHeight * 0.24]
        ],
        tailMaterial.clone()
      );
      tipFin.rotation.y = -Math.PI / 2;
      tip.add(tipFin);

      return {
        root,
        segments: [
          { mesh: root, base: 0, amp: 0.22, lag: 0.15 },
          { mesh: mid, base: 0, amp: 0.62, lag: 0.7 },

    function updateFish(dt, elapsed) {
      speciesBuckets.forEach((bucket) => {
        if (bucket.length === 0) {
          return;
        }

        tempA.set(0, 0, 0);
        bucket.forEach((fish) => tempA.add(fish.root.position));
        tempA.multiplyScalar(1 / bucket.length);

        bucket.forEach((fish) => {
          const spec = fish.species;

          if (elapsed > fish.nextSurgeAt) {
            fish.surgeTarget = rand(1 - spec.hoverStrength * 0.65, 1 + spec.surgeAmp);
            fish.nextSurgeAt = elapsed + rand(...spec.surgeCycle);
          }

          fish.surgeState = THREE.MathUtils.lerp(
            fish.surgeState,
            fish.surgeTarget,
            Math.min(1, dt * (spec.key === 'angel' ? 0.7 : 1.35))
          );

          tempB.subVectors(fish.target, fish.root.position);
          const dist = tempB.length();

          if (dist < 0.95 || elapsed > fish.retargetAt) {
            fish.target.copy(randomTarget(spec.minY, spec.maxY));
            fish.target.x += rand(-spec.targetWander, spec.targetWander);
            fish.target.z += rand(-spec.targetWander * 0.85, spec.targetWander * 0.85);
            fish.laneY = THREE.MathUtils.clamp(
              fish.laneY + rand(-0.55, 0.55),
              spec.minY + 0.4,
              spec.maxY - 0.3
            );
            fish.target.x = THREE.MathUtils.clamp(fish.target.x, tank.minX + 0.8, tank.maxX - 0.8);
            fish.target.z = THREE.MathUtils.clamp(fish.target.z, tank.minZ + 0.55, tank.maxZ - 0.55);
            fish.retargetAt = elapsed + rand(1.6, spec.key === 'angel' ? 5.6 : 3.8);
            fish.cruiseBias = rand(0.86, 1.14);
            tempB.subVectors(fish.target, fish.root.position);
          }

          if (tempB.lengthSq() > 0.0001) {
            tempB.normalize();
          }

          if (spec.schooling > 0) {
            const towardCenter = tempLook.subVectors(tempA, fish.root.position).multiplyScalar(spec.schooling);
            tempB.add(towardCenter);
          }

          tempB.y +=
            (fish.laneY + Math.sin(elapsed * 0.42 + fish.hoverPhase) * spec.verticalWave - fish.root.position.y) *
            spec.laneBias;

          tempC.set(0, 0, 0);
          bucket.forEach((other) => {
            if (other === fish) {
              return;
            }

            tempD.subVectors(fish.root.position, other.root.position);
            const distSq = tempD.lengthSq();
            const range = spec.personalSpace * spec.personalSpace;

            if (distSq > 0.0001 && distSq < range) {
              const distScale = 1 - Math.sqrt(distSq) / spec.personalSpace;
              tempC.add(tempD.normalize().multiplyScalar(distScale));
            }
          });

          tempB.addScaledVector(tempC, spec.separation);

          swimObstacles.forEach((obstacle) => {
            tempD.subVectors(fish.root.position, obstacle.center);
            const distToObstacle = tempD.length();
            const safeRadius = obstacle.radius + spec.personalSpace * 0.6;

            if (distToObstacle > 0.0001 && distToObstacle < safeRadius) {
              const avoidScale = (1 - distToObstacle / safeRadius) * spec.obstacleAvoidance;
              tempB.addScaledVector(tempD.normalize(), avoidScale);
              tempB.y += avoidScale * 0.2;
            }
          });

          const margin = 1.1;
          if (fish.root.position.x < tank.minX + margin) {
            tempB.x += (tank.minX + margin - fish.root.position.x) * 1.5;
          }
          if (fish.root.position.x > tank.maxX - margin) {
            tempB.x -= (fish.root.position.x - (tank.maxX - margin)) * 1.5;
          }
          if (fish.root.position.y < spec.minY + 0.35) {
            tempB.y += (spec.minY + 0.35 - fish.root.position.y) * 1.45;
          }
          if (fish.root.position.y > spec.maxY - 0.25) {
            tempB.y -= (fish.root.position.y - (spec.maxY - 0.25)) * 1.3;
          }
          if (fish.root.position.z < tank.minZ + margin) {
            tempB.z += (tank.minZ + margin - fish.root.position.z) * 1.3;
          }
          if (fish.root.position.z > tank.maxZ - margin) {
            tempB.z -= (fish.root.position.z - (tank.maxZ - margin)) * 1.3;
          }

          const targetSpeed =
            fish.baseSpeed *
            fish.cruiseBias *
            fish.surgeState *
            (0.92 + Math.sin(elapsed * fish.cruiseFreq + fish.phase) * 0.1) *
            (dist < 2.4 ? THREE.MathUtils.mapLinear(dist, 0, 2.4, 0.42, 1) : 1);

          tempB.normalize().multiplyScalar(targetSpeed);
          fish.velocity.lerp(tempB, Math.min(1, dt * spec.turnLerp));

          fish.root.position.addScaledVector(fish.velocity, dt);
          fish.root.position.x = THREE.MathUtils.clamp(fish.root.position.x, tank.minX + 0.55, tank.maxX - 0.55);
          fish.root.position.y = THREE.MathUtils.clamp(fish.root.position.y, spec.minY, spec.maxY);
          fish.root.position.z = THREE.MathUtils.clamp(fish.root.position.z, tank.minZ + 0.42, tank.maxZ - 0.42);

          if (fish.velocity.lengthSq() > 0.0001) {
            tempLook.copy(fish.root.position).add(fish.velocity);
            tempMatrix.lookAt(tempLook, fish.root.position, fish.root.up);
            tempQuat.setFromRotationMatrix(tempMatrix);
            fish.root.quaternion.slerp(tempQuat, Math.min(1, dt * spec.orientSpeed));

            tempD.copy(fish.velocity).normalize();
            fish.turn = THREE.MathUtils.lerp(
              fish.turn,
              tempC.copy(fish.heading).cross(tempD).y,
              Math.min(1, dt * 4.4)
            );
            fish.heading.lerp(tempD, Math.min(1, dt * 3.6)).normalize();
          }

          const speedRatio = THREE.MathUtils.clamp(fish.velocity.length() / fish.baseSpeed, 0.45, 1.3);
          const beat = elapsed * spec.finSpeed * fish.cruiseFreq + fish.phase;

          fish.tails.forEach((tail) => {
            tail.mesh.rotation.y =
              tail.base +
              Math.sin(beat * spec.tailFrequency + tail.lag) * spec.tailAmp * tail.amp * speedRatio +
              fish.turn * 0.8 * tail.amp;
          });

          fish.fins.forEach((fin) => {
            const v = Math.sin(beat * (fin.speedScale || 1.2) + fin.offset) * fin.amp * speedRatio;
            fin.mesh.rotation[fin.axis] = fin.base + v;
          });

          fish.body.rotation.y = Math.sin(beat * 0.92) * 0.06 * speedRatio;
          fish.body.rotation.x = Math.sin(beat * 0.46) * spec.bodyPitch;
          fish.body.position.y = Math.sin(beat * 0.38 + fish.hoverPhase) * (0.03 + spec.hoverStrength * 0.12);
          fish.rig.rotation.z = THREE.MathUtils.clamp(-fish.turn * spec.bankStrength, -0.26, 0.26);
          fish.rig.rotation.y = Math.sin(beat * 0.54) * fish.rollAmp * 0.2;
        });
      });
    }

    function createWaterParticles() {
      const count = 560;
      const positions = new Float32Array(count * 3);

      for (let i = 0; i < count; i += 1) {
        positions[i * 3 + 0] = rand(tank.minX + 0.4, tank.maxX - 0.4);
        positions[i * 3 + 1] = rand(tank.minY + 0.2, tank.maxY - 0.1);
        positions[i * 3 + 2] = rand(tank.minZ + 0.2, tank.maxZ - 0.2);
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

      const mat = new THREE.PointsMaterial({
        color: 0xb6e4dd,
        size: 0.04,
        transparent: true,
        opacity: 0.24,
        depthWrite: false
      });

      const points = new THREE.Points(geo, mat);
      scene.add(points);

      return { points, positions };
    }

    function applyInteractiveClick(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(clickableMeshes, false);

      if (hits.length === 0) {
        return;
      }

      const hit = hits[0].object;
      const info = hit.userData.interactive;
      if (!info) {
        return;
      }

      showQuote(info);

      const root = hit.userData.interactiveRoot;
      if (!root) {
        return;
      }

      const flashed = [];
      root.traverse((child) => {
        if (!child.isMesh) {
          return;
        }
        const material = child.material;
        if (!material || !('emissive' in material)) {
          return;
        }
        flashed.push({ material, original: material.emissive.getHex() });
        material.emissive = material.emissive.clone().lerp(new THREE.Color(0x9fe8c8), 0.55);
      });

      setTimeout(() => {
        flashed.forEach((item) => {
          item.material.emissive.setHex(item.original);
        });
      }, 420);
    }

      presetFogColor.setHex(preset.fog);
      scene.background.copy(presetSceneColor);
      scene.fog.color.copy(presetFogColor);
      scene.fog.density = preset.fogDensity;
      renderer.toneMappingExposure = preset.exposure;
      keyLight.position.copy(preset.keyPosition);
      fillLight.position.copy(preset.fillPosition);
      backLight.position.copy(preset.backPosition);
      ambientLight.color.copy(preset.ambientTint);
      fillLight.color.copy(preset.fillTint);
      backLight.color.copy(preset.backTint);

    function applyIntensityControl() {
      const preset = lightingPresets[activePresetKey];
      const level = Number(intensityInput.value);
      intensityValue.textContent = level.toFixed(2);
      keyLight.intensity = level;
      fillLight.intensity = level * (activePresetKey === 'dusk' ? 0.52 : 0.61);
      ambientLight.intensity = 0.16 + level * (activePresetKey === 'morning' ? 0.22 : 0.25);
      backLight.intensity = 0.14 + level * (activePresetKey === 'dusk' ? 0.2 : 0.17);
      topShimmer.intensity = 0.18 + level * (activePresetKey === 'morning' ? 0.26 : 0.2);
      renderer.toneMappingExposure = preset.exposure * THREE.MathUtils.mapLinear(level, 0.35, 2.4, 0.92, 1.07);
    }

    function applyWarmthControl() {
      const preset = lightingPresets[activePresetKey];
      const kelvin = Number(warmthInput.value);
      warmthValue.textContent = `${kelvin}K`;
      const color = kelvinToColor(kelvin);
      keyLight.color.copy(color);
      fillLight.color.copy(preset.fillTint.clone().lerp(color, 0.34).offsetHSL(0.01, -0.04, 0.02));
      ambientLight.color.copy(preset.ambientTint.clone().lerp(color, 0.22).offsetHSL(-0.02, -0.12, 0.06));
      backLight.color.copy(preset.backTint.clone().lerp(color, 0.12));
      topShimmer.color.copy(color.clone().offsetHSL(-0.01, -0.05, 0.1));
    }

    function applyPreset(key) {
      activePresetKey = key;
      const preset = lightingPresets[key];
      intensityInput.value = String(preset.intensity);
      warmthInput.value = String(preset.warmth);
      refreshPresetButtons();
      applyPresetLook();
      applyIntensityControl();
      applyWarmthControl();

    function animate() {
      requestAnimationFrame(animate);
      const elapsed = clock.getElapsedTime();
      const dt = Math.min(clock.getDelta(), 0.033);

      controls.update();

      animatedPlants.forEach((plant) => {
        plant.pivot.rotation.z = plant.baseZ + Math.sin(elapsed * plant.speed + plant.phase) * plant.sway;
        plant.pivot.rotation.x = plant.baseX + Math.cos(elapsed * plant.speed * 0.72 + plant.phase) * plant.sway * 0.4;
      });

      bubbles.forEach((bubble) => {
        bubble.mesh.position.y += bubble.speed * dt;
        bubble.mesh.position.x += Math.sin(elapsed * bubble.freq + bubble.phase) * bubble.wobble * dt;
        bubble.mesh.position.z += Math.cos(elapsed * (bubble.freq * 0.7) + bubble.phase) * bubble.wobble * dt * 0.8;

        if (bubble.mesh.position.y > tank.maxY + 0.02) {
          resetBubble(bubble, false);
        }
      });

      const waterPos = waterTop.geometry.attributes.position;
      for (let i = 0; i < waterPos.count; i += 1) {
        const x = waterPos.getX(i);
        const z = waterPos.getZ(i);
        const wave = Math.sin(x * 0.55 + elapsed * 1.4) * 0.05 + Math.cos(z * 0.7 + elapsed * 1.1) * 0.035;
        waterPos.setY(i, wave);
      }
      waterPos.needsUpdate = true;
      waterTop.geometry.computeVertexNormals();

      keyLight.position.x = -3.2 + Math.sin(elapsed * 0.23) * 1.4;
      keyLight.position.z = 5.2 + Math.cos(elapsed * 0.21) * 0.85;

      fillLight.position.y = 5.2 + Math.sin(elapsed * 0.33) * 0.3;

      updateFish(dt, elapsed);

      const p = waterParticles.positions;
      for (let i = 0; i < p.length; i += 3) {
        p[i] += Math.sin(elapsed * 0.25 + i * 0.003) * 0.0004;
        p[i + 1] += 0.11 * dt;
        p[i + 2] += Math.cos(elapsed * 0.19 + i * 0.0027) * 0.0003;

        if (p[i + 1] > tank.maxY - 0.1) {
          p[i + 1] = tank.minY + 0.1;
        }
      }
      waterParticles.points.geometry.attributes.position.needsUpdate = true;

      renderer.render(scene, camera);
    }

    showQuote({
      label: '오브젝트 명언',
      quote: '수족관 속 오브젝트를 클릭하면 관련된 명언이 표시됩니다.'
    });

    animate();
  </script>
</body>
